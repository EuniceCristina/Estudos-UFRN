{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="{% static 'tarefas/css/style.css' %}">
</head>
<body>
    <div class="main">
    <h1>Tarefas</h1>
    {%for tarefa in tarefas%}
    <div class="tarefa">
        <ul style="list-style-type: none;">
            <li>{{tarefa.nome}}</li>
        </ul>
    </div>
    {%endfor%}
    <form action="{% url 'tarefas:tarefa_create' %}"> {% csrf_token %}
        <button>Adcionar Tarefas</button></form>
    </div>
</body>
</html>
